name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build standalone executable
        run: scripts\build.bat
        shell: cmd

      - name: Package release archive
        run: |
          $staging = "dist-release"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item dist\fast-folder.exe $staging\
          Copy-Item scripts\ff.ps1 $staging\
          Copy-Item README.md $staging\
          Copy-Item LICENSE $staging\
          Compress-Archive -Path "$staging\*" -DestinationPath fast-folder-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fast-folder-windows.zip
          generate_release_notes: true
